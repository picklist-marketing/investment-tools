name: Market Monitor

on:
  schedule:
    # 日本市場 9:00-15:00 JST = 0:00-6:00 UTC（30分おき）
    - cron: '0,30 0-6 * * 1-5'
    # 米国市場 23:00-6:00 JST = 14:00-21:00 UTC（30分おき）
    - cron: '0,30 14-21 * * 1-5'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Determine market
        id: market
        run: |
          HOUR=$(TZ=Asia/Tokyo date +%H)
          if [ "$HOUR" -ge 9 ] && [ "$HOUR" -le 15 ]; then
            echo "market=jp" >> $GITHUB_OUTPUT
          else
            echo "market=us" >> $GITHUB_OUTPUT
          fi
      - name: Trading Brain scan
        run: python trading-brain.py once ${{ steps.market.outputs.market }}
      - name: Market Alert check
        run: python market-alert.py check
      - name: Commit updated positions
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add market-positions.json invest-learn-state.json
          git diff --staged --quiet || git commit -m "Update positions data" && git push
